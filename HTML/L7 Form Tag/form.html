<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Tag</title>
</head>
<body>
    <h1>Register</h1>
    <form>
        <div>
            <lable for = "username">Username:</label>
            <input type = "text" id = "username" />
        </div>
         <div>
            <lable for = "email">Enter your email:</label>
            <input type = "email" id = "email" required/>
        </div>
            <div>
            <lable for = "textarea">Message:</label>
            <textarea name = "" id = "textarea"  cols = "30" rows = "10">  </textarea>
        </div>
        
         <div>
            <lable for = "password">Password:</label>
            <input type = "password" id = "password" placeholder="Enter your password" />
        </div>
         <div>
            <lable for = "phone no.">Phone No.:</label>
            <input type = "number" id = "phone no." />
        </div>
           <div>
            <lable for = "gender">Gender:</label>
            <input type = "radio" name = "gender" value = "male"/>male
            <input type = "radio" name = "gender" value = "female"/>female
        </div>
          <div>
            <lable for = "hobbies">Hobbies:</label>
            <input type = "checkbox" name = "interest" value = "music"/>music
            <input type = "checkbox" name = "interest" value = "sports"/>sports
        </div>
        <div>
            <lable for = "country">Country:</label>
            <select name = "country" id = "country">
                <option value = "iNDIA">India</option>
                <option value = "USA">USA</option>
                <option value = "Russia">Russia</option>
                <option value = "China">China</option>
            </select>
        </div>
        <div>
            <lable for = "file">Upload your file:</label>
            <input type = "file" id = "file"/>
        </div>
        <div>
            <lable for = "dob">Date of Birth:</label>
            <input type = "date" id = "dob"/>
        </div>
        <div>
            <lable for = "time">Time </lable>
            <input type = "time" name= "time"/>
        </div>
        <div>
            <lable for = "color">Color</lable>
            <input type = "color" name= "color"/>
        </div>
        <div>
            <lable for = "website"> Website:</lable>
            <input type = "url" name = "website" placeholder =  "Enter your url"/>
        </div>
        <input type = "submit" value = "submit"/>
    </form>
</body>
</html>
