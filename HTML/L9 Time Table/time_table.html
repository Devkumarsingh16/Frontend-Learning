<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html table</title>
     <style>
        table{
            text-align:center;
            border:2px solid black;
            border-collapse: collapse;
        }
        tr,td,th{
            border:2px solid black;
            padding:10px;
        }
    </style>
</head>
<body>

                <td>mon</td>

                <td>mon</td>
            </tr>

                <td>science</td>
            </tr>
            <td colspan= "6"> Lunch</td>

                <td>SST</td>

</body>
</html>
